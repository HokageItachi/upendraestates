<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login — Vinodha Estates</title>
<link rel="stylesheet" href="admin.css" />
</head>
<body class="login-page">
    <div class="login-wrap">
        <div class="login-card">
            <div class="brand">
                <div class="brand-mark">V</div>
                <div>
                    <h1>Vinodha Estates</h1>
                    <p>Admin Control Panel</p>
                </div>
            </div>

            <form id="loginForm" class="login-form">
                <label>
                    <span>Email</span>
                    <input type="email" id="email" required autocomplete="username" placeholder="admin@vinodhaestates.com" />
                </label>
                <label>
                    <span>Password</span>
                    <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••" />
                </label>
                <button type="submit" class="btn-gold" id="loginBtn">Sign In</button>
                <p class="err" id="err"></p>
            </form>
        </div>
        <p class="foot">© Vinodha Estates · Secure admin access</p>
    </div>
    <script src="admin.js"></script>
    <script>initLogin();</script>
</body>
</html>
